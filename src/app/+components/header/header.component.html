<mat-toolbar color="primary" class="delvin-toolbar">

  @if ((isHandset$ | async) == false) {
  <div class="logo">
    <img src="/images/logo.png">
  </div>
  <span class="fx-spacer"></span>
  <div class="desktop-menu">
    <a mat-button routerLink="home">صفحه اصلی</a>
    <a mat-button routerLink="products">محصولات</a>
    <a mat-button routerLink="about">درباره ما</a>
  </div>
  <span class="fx-spacer"></span>
  <button mat-raised-button color="accent" routerLink="/login">ورود / ثبت نام</button>
  }
  @if ((isHandset$ | async))
  {
  <button mat-icon-button aria-label="Toggle menu" (click)="mobileMenuToggle()" class="mobile-menu-button">
    <mat-icon>menu</mat-icon>
  </button>
  <span class="fx-spacer"></span>
  <div class="logo">
    <img src="/images/logo.png">
  </div>
  }


  @if ((isHandset$ | async)) {
  <mat-sidenav-container class="sidenav-container">
    <mat-sidenav #sidenav mode="over" [opened]="isMobileMenuOpen" (openedChange)="isMobileMenuOpen = $event">
      <mat-nav-list>
        <a mat-list-item routerLink="/home" (click)="sidenav.close()">صفحه اصلی</a>
        <a mat-list-item routerLink="products" (click)="sidenav.close()">محصولات</a>
        <a mat-list-item routerLink="about" (click)="sidenav.close()">درباره ما</a>
        <a mat-list-item routerLink="/login" (click)="sidenav.close()">ورود / ثبت نام</a>
      </mat-nav-list>
    </mat-sidenav>
    <!-- sidenav-content خالی برای اینکه Material بتواند sidenav را مدیریت کند -->
    <mat-sidenav-content class="sidenav-content-hidden"></mat-sidenav-content>
  </mat-sidenav-container>


  }
</mat-toolbar>
