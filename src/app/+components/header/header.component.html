<mat-toolbar color="primary" class="delvin-toolbar">


  @if ((isHandset$ | async) == false) {
  <div class="logo">
    <img src="/images/logo.png">
  </div>
  <span class="fx-spacer"></span>
  <div class="desktop-menu">
    <a mat-button routerLink="home">صفحه اصلی</a>
    <a mat-button routerLink="products">محصولات</a>
    <a mat-button routerLink="about">درباره ما</a>
  </div>
  <span class="fx-spacer"></span>
  <button mat-raised-button color="accent" routerLink="/login">ورود / ثبت نام</button>
  }
  @if ((isHandset$ | async))
  {

  <span class="fx-spacer-mobile"></span>
  <button mat-icon-button aria-label="Toggle menu" (click)="mobileMenuToggle($event)" class="mobile-menu-button">
    <mat-icon>{{ isMobileMenuOpen ? 'close' : 'menu' }}</mat-icon>
  </button>
  <span class="fx-spacer"></span>
  <div class="logo">
    <img src="/images/logo.png">
  </div>
  }



</mat-toolbar>

<!-- سایدمنوی موبایل (فقط در حالت موبایل نمایش داده می‌شود) -->
@if ((isHandset$ | async)){
<mat-sidenav-container class="sidenav-container">
  <mat-sidenav #sidenav mode="over"
               [opened]="isMobileMenuOpen"
               (opened)="handleMenuOpened()"
               (closed)="handleMenuClosed()">
    <mat-nav-list>
      <a mat-list-item routerLink="/home" (click)=" isMobileMenuOpen = false;" >صفحه اصلی</a>
      <a mat-list-item routerLink="/products" (click)="isMobileMenuOpen = false;">محصولات</a>
      <a mat-list-item routerLink="/about" (click)=" isMobileMenuOpen = false;">درباره ما</a>
      <mat-divider></mat-divider>
      <a mat-list-item routerLink="/login" (click)="isMobileMenuOpen = false;">ورود / ثبت نام</a>
    </mat-nav-list>
  </mat-sidenav>


  <!-- sidenav-content خالی برای اینکه Material بتواند sidenav را مدیریت کند -->
  <mat-sidenav-content class="sidenav-content-hidden"></mat-sidenav-content>
</mat-sidenav-container>
}
