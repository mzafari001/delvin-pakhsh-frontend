@if (busy) {
<mat-progress-bar mode="indeterminate"></mat-progress-bar>

}
@if (action=='list') {
<button (click)="create()" mat-flat-button>افزودن</button>

<table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

  <!--- Note that these columns can be defined in any order.
        The actual rendered columns are set as a property on the row definition" -->

  <!-- Position Column -->

  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef> ای دی محصول </th>
    <td mat-cell *matCellDef="let element"> {{element.id}} </td>
  </ng-container>
  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef> نام محصول </th>
    <td mat-cell *matCellDef="let element"> {{element.name}} </td>
  </ng-container>
  <!-- Name Column -->
  <ng-container matColumnDef="price">
    <th mat-header-cell *matHeaderCellDef> قیمت </th>
    <td mat-cell *matCellDef="let element"> {{element.price}} </td>
  </ng-container>

  <!-- Weight Column -->
  <ng-container matColumnDef="description">
    <th mat-header-cell *matHeaderCellDef> توضیح </th>
    <td mat-cell *matCellDef="let element"> {{element.description}} </td>
  </ng-container>

  <!-- Symbol Column -->
  <ng-container matColumnDef="imageUrl">
    <th mat-header-cell *matHeaderCellDef> عکس </th>
    <td mat-cell *matCellDef="let element"> <img mat-card-image src="./images/{{element.imagUrl}}"> </td>
  </ng-container>

  > <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef> عملیات</th>
    <td mat-cell *matCellDef="let element">
      <button (click)="edit(element)" aria-label="Example icon button with a menu icon">
        <mat-icon>edit</mat-icon>
      </button>&nbsp;
      <button (click)="delete(element)" aria-label="Example icon button with a menu icon">
        <mat-icon>delete</mat-icon>
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>
}

@else {
<app-private-product [action]="action" [current]="selected" (onCansel)="cansel()"
  (onOk)="ok($event)"></app-private-product>
}
