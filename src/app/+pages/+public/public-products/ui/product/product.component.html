<mat-card class="product-card">
  <img mat-card-image src="./images/{{product.imageUrl}}" class="product-image">
  <mat-card-content class="product-content">
    <h3 mat-card-title>
      {{ product.name }}
    </h3>
    <p class="price">
      {{ product.price}} تومان
    </p>
    <mat-card-subtitle class="description">
      {{ product.description }}
    </mat-card-subtitle>
  </mat-card-content>
  <mat-card-actions>
    <button mat-raised-button (click)="buy(product) ">
      <mat-icon>shopping_cart</mat-icon>
      افزودن به سبد خرید
    </button>
  </mat-card-actions>
</mat-card>
