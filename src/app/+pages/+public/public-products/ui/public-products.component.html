@if (products$ | async; as products) {

  @if (products.length > 0) {

    <div class="products-container">
      @for (product of products; track product.id) {
        <app-product [product]="product"></app-product>
      }
    </div>

  } @else {
    <p>محصولی یافت نشد.</p>
  }

} @else {
  <p>در حال دریافت محصولات...</p>
}
